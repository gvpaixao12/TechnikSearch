<style>
  /* Ensure custom dual-thumb sliders accept clicks */
  input.tk-dual-thumb { pointer-events: none; }
  input.tk-dual-thumb::-webkit-slider-thumb {
    pointer-events: auto;
    appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--tk-primary);
    border: 3px solid #fff;
    box-shadow: 0 2px 6px rgba(25,25,58,0.3);
    cursor: grab;
  }
  input.tk-dual-thumb::-moz-range-thumb {
    pointer-events: auto;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--tk-primary);
    border: 3px solid #fff;
    box-shadow: 0 2px 6px rgba(25,25,58,0.3);
    cursor: grab;
  }
  input.tk-dual-thumb::-webkit-slider-runnable-track,
  input.tk-dual-thumb::-moz-range-track { background: transparent; }
</style>
</head>
